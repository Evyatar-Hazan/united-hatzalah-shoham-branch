name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Skip deploy until Cloudflare token is configured
        if: ${{ env.CLOUDFLARE_API_TOKEN == '' }}
        run: echo "CLOUDFLARE_API_TOKEN is not configured; skipping Cloudflare deploy."

      - name: Checkout
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/checkout@v5

      - name: Setup Node
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm ci

      - name: Build Cloudflare app
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npm run build:cloudflare

      - name: Apply D1 migrations
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler d1 migrations apply united-hatzalah-shoham-branch --remote

      - name: Deploy Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        run: npx wrangler pages deploy apps/client/dist --project-name united-hatzalah-shoham-branch --branch main
